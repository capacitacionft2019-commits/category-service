name: 1. Deploy Infrastructure Category Service

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**' # Asegúrate de que tus archivos Bicep estén dentro de la carpeta 'infra'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-bicep:
    name: Provision Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Deploy Bicep template
        uses: azure/CLI@v2
        with:
          inlineScript: |
            # Establece explícitamente el contexto de la suscripción
            az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
            # Ejecuta el despliegue
            az deployment group create \
              --resource-group "RSGRCUSAPP01" \
              --template-file ./infra/main.bicep