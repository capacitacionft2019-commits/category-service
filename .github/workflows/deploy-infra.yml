name: 1. Deploy Infrastructure Category Service

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-bicep:
    name: Provision Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Deploy Bicep template
        uses: azure/CLI@v2
        env:
          # Asignamos el valor del secreto a una variable de entorno interna
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUSCRIPTION_ID }}
        with:
          inlineScript: |
            # Usamos la variable de entorno aquÝ
            echo "Estableciendo la suscripciˇn..."
            az account set --subscription "$SUBSCRIPTION_ID"
            
            # Ejecutamos el despliegue
            echo "Iniciando despliegue de Bicep..."
            az deployment group create \
              --resource-group "RSGRCUSAPP01" \
              --template-file ./infra/main.bicep